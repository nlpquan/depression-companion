name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy pytest pytest-cov pytest-mock pydantic pyyaml loguru fastapi httpx numpy scikit-learn
          pip install --no-deps -e "."

      - name: Run tests
        run: |
          pytest tests/ -v \
            --ignore=tests/unit/test_audio_model.py \
            --ignore=tests/unit/test_text_model.py \
            --ignore=tests/unit/test_ensemble.py \
            --ignore=tests/unit/test_cross_modal.py \
            --ignore=tests/unit/test_multi_task.py \
            --ignore=tests/unit/test_temporal_model.py \
            --ignore=tests/unit/test_forecasting.py \
            --ignore=tests/unit/test_attribution.py \
            --ignore=tests/unit/test_dataset.py \
            --ignore=tests/unit/test_early_warning.py \
            --ignore=tests/unit/test_safety_classifier.py \
            --ignore=tests/unit/test_retriever.py \
            --ignore=tests/unit/test_orchestrator.py \
            --ignore=tests/unit/test_audio_processor.py \
            --ignore=tests/unit/test_text_processor.py \
            --ignore=tests/integration/ \
            --cov=src/depression_companion \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Lint with ruff
        run: ruff check src/ tests/ --ignore=F401
        continue-on-error: true

      - name: Check formatting with black
        run: black --check --line-length=100 src/ tests/
        continue-on-error: true

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/ -v \
            --ignore=tests/unit/test_audio_model.py \
            --ignore=tests/unit/test_text_model.py \
            --ignore=tests/unit/test_ensemble.py \
            --ignore=tests/unit/test_cross_modal.py \
            --ignore=tests/unit/test_multi_task.py \
            --ignore=tests/unit/test_temporal_model.py \
            --ignore=tests/unit/test_forecasting.py \
            --ignore=tests/unit/test_attribution.py \
            --ignore=tests/unit/test_dataset.py \
            --ignore=tests/integration/ \
            --cov=src/depression_companion \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-py${{ matrix.python-version }}
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true